<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRIP CLIENT APK MOD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 450px;
            background: #1e1e1e;
            margin: 50px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 {
            color: #ff4757;
            font-size: 28px;
            margin-bottom: 25px;
        }
        .btn {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background-color: #e84118;
        }
        .hidden {
            display: none;
        }
        .qr-section img {
            width: 250px;
            height: 250px;
            margin-top: 15px;
            border-radius: 10px;
            border: 4px solid #fff;
            object-fit: contain;
            background: white;
        }
        .payment-msg {
            font-size: 18px;
            color: #fbc531;
            font-weight: bold;
            margin: 15px 0;
        }
        .timer {
            font-size: 24px;
            color: #00a8ff;
            font-weight: bold;
            margin: 15px 0;
        }
        .success-box {
            background: #2f3640;
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            border-left: 5px solid #4cd137;
        }
        .success-title {
            color: #4cd137;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        .key-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #121212;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .copy-btn {
            background: #4cd137;
            color: black;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        .copy-btn:hover {
            background: #44bd32;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="step1">
        <h1>DRIP CLIENT APK MOD</h1>
        <button class="btn" onclick="showQRSection()">Continue</button>
    </div>

    <div id="step2" class="hidden">
        <h1>DRIP CLIENT APK MOD</h1>
        <div class="qr-section">
            <img id="qrCode" src="qr.png" alt="Payment QR Code">
            <br><br>
            <a id="downloadBtn" href="qr.png" download="qr.png" class="btn" style="background-color: #00a8ff;">Save QR Code</a>
        </div>
        <p class="payment-msg">payment karo turant key mil jayega</p>
        <p style="color: #bbb;">Valid for 5 minutes only</p>
        <div class="timer" id="countdown">05:00</div>
    </div>

    <div id="step3" class="hidden">
        <div class="success-title">✅ Payment Successful!</div>
        <div class="success-box">
            <p><strong>🎮 Game:</strong> 🛒Drip Client ApkMod</p>
            <p><strong>⏳ Duration:</strong> 1 Days</p>
            <p><strong>📦 Quantity:</strong> 1</p>
            <div class="key-container">
                <span><strong>🔑 Key:</strong> <span id="keyText">9497085095</span></span>
                <button class="copy-btn" onclick="copyKey()">Copy</button>
            </div>
            <br>
            <p style="text-align: center; margin-bottom: 0;">🙏 Thank you for your purchase!</p>
        </div>
    </div>
</div>

<script>
    function showQRSection() {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        startTimer(300); // 5 minutes = 300 seconds
    }

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);

            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            countdownEl.textContent = minutes + ":" + seconds;

            if (--timer < 0) {
                clearInterval(interval);
                showSuccessSection();
            }
        }, 1000);
    }

    function showSuccessSection() {
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step3').classList.remove('hidden');
    }

    function copyKey() {
        const keyText = document.getElementById('keyText').innerText;
        navigator.clipboard.writeText(keyText).then(() => {
            alert("Key copied to clipboard!");
        }).catch(err => {
            alert("Error copying text: ", err);
        });
    }
</script>

</body>
</html>
